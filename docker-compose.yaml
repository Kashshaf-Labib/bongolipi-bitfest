version: "3.8"

services:
  client:
    build:
      context: ./client
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - DBNAME=bongolipi
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Browser talks to these services directly, so use host-mapped ports.
      - NEXT_PUBLIC_PDF_QUERY_URL=http://localhost:8000
      - NEXT_PUBLIC_COLLAB_URL=ws://localhost:1234
      - COLLAB_SECRET=${COLLAB_SECRET}
    depends_on:
      - mongo
      - server
      - collab
    volumes:
      - ./client:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]

  collab:
    build:
      context: ./collab
    ports:
      - "1234:1234"
    environment:
      - PORT=1234
      - COLLAB_SECRET=${COLLAB_SECRET}
      - MONGODB_URI=mongodb://mongo:27017
      - DBNAME=bongolipi
    depends_on:
      - mongo
    volumes:
      - ./collab:/app
      - /app/node_modules
    command: ["node", "index.js"]

  server:
    build:
      context: ./server
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./server:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  mongo:
    image: mongo:6.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
