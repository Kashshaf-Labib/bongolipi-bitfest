# Production bundle for one host (e.g. an Oracle Always-Free ARM VM).
# Runs the mBART model, the RAG server, the collab server, and Caddy (which
# terminates HTTPS automatically for <service>.<VM_IP>.sslip.io — no DNS setup).
#
#   cd deploy && cp .env.example .env  (fill it in) && docker compose up -d --build
services:
  model:
    build: ../model
    environment:
      - MODEL_ID=${MODEL_ID:-kashshaf-labib/banglish-bangla-mbart}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    restart: unless-stopped

  server:
    build:
      context: ../server
      dockerfile: DockerFile
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    restart: unless-stopped

  collab:
    build: ../collab
    environment:
      - PORT=1234
      - COLLAB_SECRET=${COLLAB_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - DBNAME=${DBNAME:-bongolipi}
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VM_IP=${VM_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - model
      - server
      - collab
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
